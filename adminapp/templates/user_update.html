{% extends 'base.html' %}
{% block content %}

<div class="header">
  <h1>Update Profile</h1>
  <p>Edit your personal information</p>
</div>

<div class="form-wrapper">
  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" value="{{ user.username }}" required>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" value="{{ user.email|default:'' }}">
    </div>

    <div class="form-group">
      <label>Job Post</label>
      <input type="text" name="job_post" value="{{ user.job_post|default:'' }}">
    </div>

    <div class="form-group">
      <label>Phone</label>
      <input type="text" name="phone" value="{{ user.phone|default:'' }}">
    </div>

    <div class="form-group">
      <label>Address</label>
      <textarea name="address">{{ user.address|default:'' }}</textarea>
    </div>

    <div class="form-group">
      <label>Profile Image</label>
      <input type="file" name="image">
    </div>

    {% if user.image %}
      <img src="{{ user.image.url }}" style="width:80px; border-radius:50%; margin-top:10px;">
    {% endif %}

    <div class="form-actions">
      <button class="btn">Update Profile</button>
    </div>
  </form>
</div>

{% endblock %}
