{% extends 'base.html' %}
{% block content %}

<div class="header">
  <h1>Create Service</h1>
  <p>Add a new business service</p>
</div>

<div class="form-wrapper">

  <form method="POST">
    {% csrf_token %}

    <div class="form-group">
      <label>Service Name</label>
      <input type="text" name="name" placeholder="e.g. Web Development" value="{{ service.name }}" required>
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea name="description" placeholder="Describe the service">{{ service.description }}</textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Price</label>
        <input type="number" step="0.01" name="price" placeholder="0.00" value="{{ service.price }}" required>
      </div>

      <div class="form-group">
        <label>Duration (Days)</label>
        <input type="number" name="duration_days" placeholder="Estimated time" value="{{ service.duration_days }}" required>
      </div>
    </div>


    <div class="form-actions">
      <button type="submit" class="btn">Save Service</button>
    </div>

  </form>

</div>

{% endblock %}
