{% extends 'base.html' %}
{% block content %}


{% if messages %}
    {% for message in messages %}
        <div style="color:green;">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<div class="header">
  <h1>Create Service</h1>
  <p>Add a new business service</p>
</div>

<div class="form-wrapper">

  <form method="POST">
    {% csrf_token %}

    <div class="form-group">
      <label>Service Name</label>
      <input type="text" name="name" placeholder="e.g. Web Development" required>
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea name="description" placeholder="Describe the service"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Price</label>
        <input type="number" step="0.01" name="price" placeholder="0.00" required>
      </div>

      <div class="form-group">
        <label>Duration (Days)</label>
        <input type="number" name="duration_days" placeholder="Estimated time" required>
      </div>
    </div>


    <div class="form-actions">
      <button type="submit" class="btn">Save Service</button>
    </div>

  </form>

</div>

{% endblock %}
