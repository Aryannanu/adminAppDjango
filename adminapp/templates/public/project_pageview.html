<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Projects</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #0b0e13;
      color: #e6e9f0;
      padding: 50px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 32px;
      margin-bottom: 6px;
    }

    .header p {
      color: #9aa2c0;
      font-size: 14px;
    }

    .project-flex {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      justify-content: center;
    }

    .project-card {
      width: 25%;
      height:100%;
      background: rgba(20, 25, 40, 0.85);
      border-radius: 18px;
      padding: 16px;
      text-decoration: none;
      color: #fff;
      transition: 0.3s;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    }

    .project-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.55);
    }

    .project-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 12px;
    }

    .no-image {
      width: 100%;
      height: 160px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9aa2c0;
      margin-bottom: 12px;
    }

    .project-card h3 {
      text-align: center;
      font-size: 16px;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>Projects</h1>
    <p>All available projects</p>
  </div>

  <div class="project-flex">
    {% for project in projects %}
      <a href="{% url 'project_alldetails' project.id %}" class="project-card">

        {% if project.image %}
          <img src="{{ project.image.url }}" alt="{{ project.name }}">
        {% else %}
          <div class="no-image">No Image</div>
        {% endif %}

        <h3>{{ project.name }}</h3>
      </a>
    {% endfor %}
  </div>

</body>
</html>
