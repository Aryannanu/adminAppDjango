<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ project.name }}</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #0b0e13;
      color: #e6e9f0;
      padding: 40px;
    }

    .project_detail {
      max-width: 1100px;
      margin: auto;
      background: rgba(20, 25, 40, 0.85);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .detailimage {
      width: 100%;
      height: 425px;
      object-fit: cover;
    }

    .detail_info {
      padding: 30px;
    }

    .detail_info h1 {
      font-size: 32px;
      margin-bottom: 15px;
    }

    .detail_info p {
      margin-bottom: 10px;
      font-size: 15px;
      color: #cfd3e6;
    }

    .detail_info strong {
      color: #ffffff;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 18px;
      background: linear-gradient(135deg, #6fd6ff, #4aa8ff);
      color: #000;
      font-weight: 600;
      font-size: 14px;
      border-radius: 10px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(111,214,255,0.35);
    }
  </style>
</head>

<body>

  <div class="project_detail">

    {% if project.image %}
    <a href="{{ project.image.url }}" download><img src="{{ project.image.url }}" class="detailimage" > </a>
    {% endif %}

    <div class="detail_info">
      <h1>{{ project.name }}</h1>

      <p><strong>Service:</strong> {{ project.service.name }}</p>

      <p>
        <strong>Assigned To:</strong>
        {% if project.assigned_to %}
          {{ project.assigned_to.username }}
        {% else %}
          Unassigned
        {% endif %}
      </p>

      <p><strong>Status:</strong> {{ project.status }}</p>
      <p><strong>Created:</strong> {{ project.created_at }}</p>

      <a href="{% url 'project_pagess' %}" class="btn">← Back to Projects Page</a>
    </div>

  </div>

</body>
</html>
