{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background-image: url('https://images.openai.com/static-rsc-3/EW7pyt4n6qBqCGsjK8Vt3dk6c3pePicNvY4hBcq-COiSPti5lWBHdD8-An1TxzaMlPNPQKoI6jsiKcSCubilYsG6fmE7rn1PS0NzumloQ1k?purpose=fullsize');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: #e6e9f0;
    }

    .adminpage {
      display: flex;
      height: 100%;
      width: 100%;
    }

    .sidebar {
      width: 260px;
      backdrop-filter: blur(10px);
      padding: 30px 22px;
      border-right: 1px solid rgba(255,255,255,0.06);
    }

    .sidebar h2 {
      font-size: 22px;
      color: #6fd6ff;
      margin-bottom: 45px;
      letter-spacing: 0.5px;
    }

    .nav a {
      display: flex;
      align-items: center;
      padding: 13px 16px;
      margin-bottom: 10px;
      color: #cfd3e6;
      text-decoration: none;
      border-radius: 12px;
      font-size: 15px;
      transition: 0.25s ease;
    }

    .nav a:hover {
      background: rgba(111, 214, 255, 0.12);
      color: #6fd6ff;
    }

    .nav a.active {
      background: linear-gradient(90deg, rgba(111,214,255,0.25), transparent);
      color: #6fd6ff;
    }

    .content {
      flex: 1;
      padding: 35px 45px;
      overflow-y: auto;
    }

    .header {
      margin-bottom: 35px;
    }

    .header h1 {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .header p {
      color: #9aa2c0;
      font-size: 14px;
    }

  
    .card {
      backdrop-filter: blur(12px);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      padding: 28px;
      margin-bottom: 25px;
      box-shadow: 0 15px 45px rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .card h2 {
      font-size: 20px;
      margin-bottom: 10px;
      color: #ffffff;
    }

    .card p {
      font-size: 14px;
      color: #b6bddc;
      line-height: 1.6;
    }


    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 18px;
      background: linear-gradient(135deg, #6fd6ff, #4aa8ff);
      color: #000;
      font-weight: 600;
      font-size: 14px;
      border-radius: 10px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 25px rgba(111,214,255,0.35);
    }

    .user-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }



.form-wrapper {
  max-width: 650px;
  backdrop-filter: blur(14px);
  background: rgba(15, 20, 35, 0.55);
  padding: 35px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 25px 60px rgba(0,0,0,0.4);
}

.form-wrapper h2 {
  margin-bottom: 25px;
  font-size: 22px;
  color: #6fd6ff;
}

.form-group {
  margin-bottom: 18px;
}

.form-group label {
  display: block;
  margin-bottom: 6px;
  font-size: 13px;
  color: #b6bddc;
}

.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  padding: 12px 14px;
  background: rgba(20, 24, 35, 0.8);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  color: #ffffff;
  font-size: 14px;
}

.form-group textarea {
  resize: none;
  min-height: 90px;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  outline: none;
  border-color: #6fd6ff;
}

.form-row {
  display: flex;
  gap: 16px;
}

.form-row .form-group {
  flex: 1;
}

.form-group.checkbox label {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  color: #cfd3e6;
}

.form-actions {
  margin-top: 25px;
}

.form-actions .btn {
  padding: 12px 26px;
}



.card table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 18px;
  font-size: 14px;
}

.card thead th {
  padding: 12px 10px;
  text-align: center;
  font-weight: 600;
  color: #9aa2c0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}


.card tbody td {
  padding: 14px 10px;
  text-align: center;
  vertical-align: middle;
  color: #e6e9f0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.card tbody tr:hover {
  background: rgba(111, 214, 255, 0.06);
}


.card td img {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(255,255,255,0.2);
}


.card td .btn {
  display: inline-block;
  margin: 0 4px;
  padding: 7px 14px;
  font-size: 12px;
  font-weight: 600;
  border-radius: 8px;
  text-decoration: none;
  background: linear-gradient(135deg, #6fd6ff, #4aa8ff);
  color: #000;
  transition: 0.25s ease;
}

.card td .btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(111,214,255,0.35);
}



.card {
  margin-bottom: 35px;
}


.card p {
  text-align: center;
  color: #9aa2c0;
  margin-top: 15px;
}



.project-flex {
  display: flex;
  flex-wrap: wrap;
  gap: 28px;
  margin-top: 25px;
}



.project-card {
  width: calc(25% - 21px); 
  border-radius: 22px;
  padding: 18px;
  text-decoration: none;
  color: #fff;
  transition: 0.35s ease;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 18px 45px rgba(0,0,0,0.35);
  display: flex;
  flex-direction: column;
  align-items: center;
}


.project-card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 30px 65px rgba(0,0,0,0.55);
}



.project-card img {
  width: 100%;
  height: 170px;
  object-fit: cover;
  border-radius: 16px;
  margin-bottom: 14px;
}


.project-card .no-image {
  width: 100%;
  height: 170px;
  border-radius: 16px;
  background: rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #9aa2c0;
  font-size: 14px;
  margin-bottom: 14px;
}


.project-card h3 {
  font-size: 16px;
  font-weight: 600;
  text-align: center;
}


.project-detail {
  display: flex;
  gap: 40px;
  align-items: flex-start;
  margin-top: 25px;
  padding: 25px;
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 25px 60px rgba(0,0,0,0.45);
}



.project-detail-image {
  width: 420px;
  min-width: 420px;
  height: 260px;
  border-radius: 20px;
  object-fit: cover;
  box-shadow: 0 20px 45px rgba(0,0,0,0.5);
}


.project-detail-no-image {
  width: 420px;
  min-width: 420px;
  height: 260px;
  border-radius: 20px;
  background: rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #9aa2c0;
  font-size: 15px;
}



.project-detail-info {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.project-detail-info h1 {
  font-size: 30px;
  font-weight: 600;
  color: #e6e9f0;
  margin-bottom: 8px;
}

.project-meta {
  display: flex;
  gap: 18px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.meta-item {
  background: rgba(111,214,255,0.12);
  color: #6fd6ff;
  padding: 7px 14px;
  font-size: 13px;
  border-radius: 50px;
  border: 1px solid rgba(111,214,255,0.3);
}



.project-status {
  align-self: flex-start;
  padding: 6px 14px;
  border-radius: 40px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 18px;
}


.status-pending {
  background: rgba(255, 193, 7, 0.15);
  color: #ffc107;
}

.status-active {
  background: rgba(0, 200, 255, 0.15);
  color: #4fc3ff;
}

.status-completed {
  background: rgba(76, 175, 80, 0.15);
  color: #4caf50;
}


.project-actions {
  margin-top: 25px;
  display: flex;
  gap: 15px;
}

.project-actions .btn {
  padding: 10px 20px;
  font-size: 14px;
}








  </style>
</head>

<body>

<div class="adminpage">

  <div class="sidebar">
    <h2>{{ user.username }}</h2>

    <div class="nav">
      <a href="{% url 'dashboard' %}" class="active">Dashboard</a>
      <a  href="{% url 'accounts' %}">Accounts
      </a>
      <a href="{% url 'services' %}">Services</a>
      <a href="{% url 'projects' %}">Projects</a> 
      <a href="{% url 'permissions' %}">Permissions</a>
      <a href="{% url 'logout_view' %}">Logout</a>
      
    </div>
  </div>


  <div class="content">
    {% block content %} {% endblock %}
  </div>

</div>

</body>
</html>
